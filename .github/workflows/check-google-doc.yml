name: check-google-doc

# The /resume "Comment on Google Docs" button points at meta.googleDocs.publishedUrl.
# That's an external Google-hosted link this repo doesn't control the uptime of — it
# can go dark (Google abuse-detection block, unshared, deleted) with no code change
# here at all, as happened in bdelanghe/site#186. So this runs on a schedule, not just
# on PRs that touch profile.json, and fails loudly instead of leaving a dead public
# link live and undetected.
on:
  schedule:
    - cron: "17 13 * * *"
  pull_request:
    paths:
      - "data/profile.json"
      - "scripts/check-google-doc.mjs"
      - ".github/workflows/check-google-doc.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-google-doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
      - name: Google Doc link reachability
        run: node scripts/check-google-doc.mjs
