name: string-audit

# Grounded content audit via the shared, owned auditor @bounded-systems/string-audit
# (pinned as the string-audit/ submodule). Derives a typed-symbol catalog from the
# contracts, then runs type-scoped, CAS-memoized audits — most usefully the `claim`
# → grounding check, which flags any metric not in data/audit/grounding.json.
#
# Report-only: findings land in the run summary; it never blocks. With ANTHROPIC_API_KEY
# set it runs the real LLM audit on cache-misses; without a key it runs the
# deterministic, offline checks.
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "data/profile.json"
      - "data/site.json"
      - "data/highlight-copy.json"
      - "data/audit/grounding.json"
      - "audit-catalog.mjs"
      - ".gitmodules"
      - "string-audit" # the submodule pin — a version bump changes the auditor
      - ".github/workflows/string-audit.yml"

permissions:
  contents: read

jobs:
  string-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive # bring in the pinned string-audit/ (+ brand/)
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Regenerate catalog from the contracts
        run: node audit-catalog.mjs
      - name: Verify catalog is in sync with the contracts
        run: |
          git diff --exit-code data/audit/catalog.json || {
            echo "::error::data/audit/catalog.json is stale — run 'npm run audit:catalog' and commit."
            exit 1
          }
      - name: Install string-audit deps
        working-directory: string-audit
        run: npm ci --no-audit --no-fund
      - name: Restore the CAS memo cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          # string-audit memoizes each symbol's audit by sha256(AUDIT_VERSION:type:value):
          # persisting .cache/ means only *changed* copy pays for an LLM call. AUDIT_VERSION
          # is pinned to the grounding hash (below), so the cache is scoped to a grounding
          # generation — restore the latest cache for this grounding; only changed symbols miss.
          # Change grounding → new AUDIT_VERSION → every key changes → a deliberate full re-audit.
          path: string-audit/.cache
          key: string-audit-${{ hashFiles('data/audit/grounding.json') }}-${{ hashFiles('data/audit/catalog.json') }}
          restore-keys: |
            string-audit-${{ hashFiles('data/audit/grounding.json') }}-
      - name: Grounded content audit
        working-directory: string-audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CATALOG: ../data/audit/catalog.json
          GROUNDING: ../data/audit/grounding.json
          AUDIT_VERSION: ${{ hashFiles('data/audit/grounding.json') }}
        run: |
          {
            echo '# Grounded content audit (string-audit)'
            echo
            echo '```'
            node audit.mjs
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
