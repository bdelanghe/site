name: string-audit

# Deterministic copy hygiene via the shared, owned auditor @bounded-systems/string-audit
# (pinned as the string-audit/ submodule). We import its prose.mjs checks directly — the
# lightweight, egress-free path: prose.mjs's only deps are two public-npm packages, so this
# needs no JSR registry (cas / anchored-chain) and runs the same locally as in CI. Two gates:
#   - check-prose     — aiIsms / overclaims / proofread / readability; blocks on error-level
#                       (chatbot artifacts, placeholders, un-attested absolutes). Attested
#                       coverage claims (data/audit/attested-claims.json) are demoted.
#   - check-grounding — every `claim` metric must be in data/audit/grounding.json.
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "data/profile.json"
      - "data/site.json"
      - "data/highlight-copy.json"
      - "data/audit/grounding.json"
      - "data/audit/attested-claims.json"
      - "audit-catalog.mjs"
      - "check-prose.mjs"
      - "check-grounding.mjs"
      - ".gitmodules"
      - "string-audit" # the submodule pin — a version bump changes the auditor
      - ".github/workflows/string-audit.yml"

permissions:
  contents: read

jobs:
  string-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive # bring in the pinned string-audit/ (prose.mjs + rules) and brand/
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Install deps (prose.mjs's two public-npm packages)
        run: npm ci --no-audit --no-fund
      - name: Regenerate catalog from the contracts
        run: node audit-catalog.mjs
      - name: Verify catalog is in sync with the contracts
        run: |
          git diff --exit-code data/audit/catalog.json || {
            echo "::error::data/audit/catalog.json is stale — run 'npm run audit:catalog' and commit."
            exit 1
          }
      - name: Prose gate
        run: node check-prose.mjs --strict
      - name: Grounding gate
        run: node check-grounding.mjs --strict
