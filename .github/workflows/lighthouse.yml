name: lighthouse

# Lighthouse CI quality gate, run against the STATIC build (dist/). build.mjs is a pure
# function of the contracts + the pinned brand submodule, so lhci serves dist/ itself
# (staticDistDir) — no separate web server, no live network. Budgets live in
# lighthouserc.json: accessibility is a hard error at a perfect 1.0; best-practices and
# seo are blocking floors; performance is advisory (warn).
#
# IMPORTANT: a perfect Lighthouse accessibility score is a REGRESSION SIGNAL over a subset
# of automatable checks — NOT WCAG conformance. Do not claim "Meets WCAG 2.2 AA" (or
# "accessible") from this alone; that needs a full audit incl. manual testing. Report:
# "Lighthouse accessibility 100/100; no serious/critical automated violations." See
# docs/accessibility.md.
on:
  pull_request:
  push:
    branches: [main]
    paths:
      - "build.mjs"
      - "posts/**"
      - "data/**"
      - "lighthouserc.json"
      - ".github/workflows/lighthouse.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: recursive
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Build static site
        run: node build.mjs
      - name: Lighthouse CI (serves dist/ via staticDistDir)
        run: npx @lhci/cli@0.14.x autorun
