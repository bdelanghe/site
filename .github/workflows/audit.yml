name: audit

# One content gate, run the same locally and in CI: `npm run audit` (scripts/audit.mjs).
# It verifies the vendored auditor in vendor/string-audit/ against its sha256 provenance
# (vendor/string-audit/provenance.json), regenerates the typed-symbol catalog from the
# contracts, and runs the prose + grounding gate over the curated audit data — blocking
# on error-level findings or ungrounded claims (--strict). Bump the pinned auditor with
# `npm run audit:vendor -- --ref <tag>`.
on:
  pull_request:
    paths:
      - "data/**"
      - "audit-catalog.mjs"
      - "scripts/audit.mjs"
      - "vendor/string-audit/**"
      - ".github/workflows/audit.yml"
  push:
    branches: [main]
    paths:
      - "data/**"
      - "audit-catalog.mjs"
      - "scripts/audit.mjs"
      - "vendor/string-audit/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
      - name: Install deps (the gate's prose checks need an-array-of-english-words + write-good)
        run: npm ci --no-audit --no-fund
      - name: Content gate (provenance + prose + grounding, --strict)
        run: npm run audit
