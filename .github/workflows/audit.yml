name: audit

# Single content gate, run upstream. Calls the reusable workflow in
# bounded-systems/string-audit (workflow_call) — the prose + grounding logic lives
# there now (folded from the old check-prose.mjs / check-grounding.mjs), so a rule
# fix lands once upstream and every consuming site inherits it on a ref bump.
#
# Inputs are this site's curated audit data:
#   - build-cmd  regenerates the typed-symbol catalog from the contracts.
#   - catalog    data/audit/catalog.json  (generated; the shipped strings as symbols).
#   - grounding  data/audit/grounding.json (curated stat-token registry a claim may assert).
#   - attested   data/audit/attested-claims.json (curated absolute-coverage allowlist).
# Replaces both the old report-only audit.yml and the string-audit.yml gate.
on:
  pull_request:
    paths:
      - "data/**"
      - "audit-catalog.mjs"
      - ".github/workflows/audit.yml"
  push:
    branches: [main]
    paths:
      - "data/**"
      - "audit-catalog.mjs"
  workflow_dispatch:

jobs:
  audit:
    uses: bounded-systems/string-audit/.github/workflows/audit.yml@v0.6.0
    with:
      ref: v0.6.0 # run the gate from the same tagged string-audit
      build-cmd: "node audit-catalog.mjs"
      catalog: "data/audit/catalog.json"
      grounding: "data/audit/grounding.json"
      attested: "data/audit/attested-claims.json"
      strict: true
    secrets: inherit
