name: audit

# string-audit (vendored submodule) over the authored copy: each string is a typed
# symbol (claim → grounding, headline → punch). Deterministic checks free; claim-
# grounding via the LLM when ANTHROPIC_API_KEY is set. Report-only — flip to a gate
# once dictionary + grounding are tuned.
on:
  pull_request:
    paths: ["data/**", "posts/**", "build.mjs", ".github/workflows/audit.yml"]
  push:
    branches: [main]
    paths: ["data/**", "posts/**", "build.mjs", ".github/workflows/audit.yml"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - name: Build (emits dist/catalog.json)
        run: node build.mjs
      - name: Update string-audit submodule to latest main
        run: git -C string-audit fetch -q --depth 1 origin main && git -C string-audit checkout -q FETCH_HEAD
      - name: Audit copy (report-only)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd string-audit
          npm install --no-save an-array-of-english-words write-good
          CATALOG="$GITHUB_WORKSPACE/dist/catalog.json" node audit.mjs || true
