name: audit

# string-audit (bounded-systems/string-audit) over the authored copy: each string is a
# typed symbol (claim → grounding, headline → punch, …). Deterministic checks run free;
# claim-grounding uses the LLM when ANTHROPIC_API_KEY is set. Report-only for now —
# findings land in the run log; flip to a gate once the dictionary + grounding are tuned.
on:
  pull_request:
    paths: ["data/**", "posts/**", "build.mjs", ".github/workflows/audit.yml"]
  push:
    branches: [main]
    paths: ["data/**", "posts/**", "build.mjs", ".github/workflows/audit.yml"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - name: Build (emits dist/catalog.json)
        run: node build.mjs
      - name: Get string-audit
        run: git clone --depth 1 https://github.com/bounded-systems/string-audit string-audit
      - name: Audit copy (report-only)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: cd string-audit && CATALOG="$GITHUB_WORKSPACE/dist/catalog.json" node audit.mjs || true
