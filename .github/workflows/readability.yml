name: readability

# Readability SIGNAL — a report, not a gate. readability-gate computes a US reading-grade
# signal (Flesch-Kincaid / Gunning Fog) over the curated copy and flags long sentences,
# long paragraphs, passive voice, and unexplained acronyms. It is WARN-by-default: green
# unless an EGREGIOUS threshold is hit (a runaway sentence / absurd grade). This job surfaces
# the signal on each PR; it does NOT block. It is a readability signal, NOT a cognitive-load
# score (see docs/readability-gate.md). Run `npm run check:readability -- --strict` to block.
on:
  pull_request:
    paths:
      - "data/profile.json"
      - "data/presentation.json"
      - "data/copy.json"
      - "scripts/readability-gate.mjs"
      - ".github/workflows/readability.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  readability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Readability signal (WARN-only report)
        run: node scripts/readability-gate.mjs
