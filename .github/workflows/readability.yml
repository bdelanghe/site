name: readability

# Readability + MD-parity SIGNALS — reports, not gates. readability-gate computes a US
# reading-grade signal (Flesch-Kincaid / Gunning Fog) over the curated copy and flags long
# sentences, long paragraphs, passive voice, and unexplained acronyms. md-parity-gate
# compares each built page's visible text against its Markdown twin's word coverage — the
# ai-readability gate elsewhere only checks that a .md sibling FILE exists, never that it
# still carries the same content. Both are WARN-by-default: green unless an EGREGIOUS
# threshold is hit. This job surfaces the signals on each PR; it does NOT block. Run
# `npm run check:readability -- --strict` / `npm run check:md-parity -- --strict` to block.
on:
  pull_request:
    paths:
      - "data/profile.json"
      - "data/presentation.json"
      - "data/copy.json"
      - "build.mjs"
      - "posts/**"
      - "scripts/readability-gate.mjs"
      - "scripts/md-parity-gate.mjs"
      - ".github/workflows/readability.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  readability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
      - run: npm ci # installs @bdelanghe/brand (build.mjs reads it from node_modules)
      - name: Readability signal (WARN-only report)
        run: node scripts/readability-gate.mjs
      - name: Build dist/ (md-parity-gate needs both the HTML and its Markdown twin)
        run: node build.mjs
      - name: MD-parity signal (WARN-only report)
        run: node scripts/md-parity-gate.mjs dist
