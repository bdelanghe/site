name: semantic

# lone — bless each rendered post's DOM (semantic HTML + accessibility). The runtime
# member of the contract family (content schemas + brand design tokens + lone semantics).
# Blocking: any error-severity finding fails the build.
on:
  pull_request:
  push:
    branches: [main]
    paths: ["posts/**", "build.mjs", "posts.mjs", "semantic/**", ".github/workflows/semantic.yml"]
  workflow_dispatch:

jobs:
  bless:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - name: Build site
        run: node build.mjs
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # lone comes from JSR (jsr:@bounded-systems/lone), pinned by deno.lock — no clone,
      # no hand-managed sha. --frozen fails if the lock is stale, so the gate engine is
      # reproducible at the exact version the committed lock records.
      - name: lone — bless rendered posts
        run: deno run --frozen --allow-read --allow-net --config semantic/deno.json semantic/gate.ts
