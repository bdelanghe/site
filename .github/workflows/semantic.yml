name: semantic

# lone — bless each rendered post's DOM (semantic HTML + accessibility). The runtime
# member of the contract family (content schemas + brand design tokens + lone semantics).
# Blocking: any error-severity finding fails the build.
on:
  pull_request:
  push:
    branches: [main]
    paths: ["posts/**", "build.mjs", "posts.mjs", "semantic/**", "vendor/conformance-kit/gates/semantic/**", ".github/workflows/semantic.yml"]
  workflow_dispatch:

jobs:
  bless:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
      - run: npm ci # installs @bdelanghe/brand (build.mjs reads it from node_modules)
      - name: Vendored conformance-kit hash-pin is intact (this workflow calls build.mjs directly, bypassing npm's prebuild hook)
        run: npm run check:integrity
      - name: Build site
        run: node build.mjs
      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2
        with:
          deno-version: v2.x
      # lone comes from JSR (jsr:@bounded-systems/lone), pinned by semantic/deno.lock
      # (the consumer's lock) — no clone, no hand-managed sha. --frozen fails if the
      # lock is stale, so the gate engine is reproducible at the version the committed
      # lock records. The runner itself is the vendored, hash-pinned conformance-kit
      # gate; its import map (deno.json) ships with it. --allow-env: the kit gate reads
      # $SEMANTIC_DIR / $SEMANTIC_SELECTOR (defaults match this site: dist/blog · article).
      - name: lone — bless rendered posts
        run: deno run --frozen --lock=semantic/deno.lock --allow-read --allow-net --allow-env --config vendor/conformance-kit/gates/semantic/deno.json vendor/conformance-kit/gates/semantic/gate.ts
