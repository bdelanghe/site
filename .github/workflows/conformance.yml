name: conformance

# Re-proving gates for the /conformance evidence that needs the build toolchain
# installed (the vendored kit axe gate via a real browser, the Nu HTML Checker, and
# Baseline). Each gate MEASURES a tier-1 external criterion over the freshly-built
# dist/ and BLOCKS on regression, so data/conformance-evidence.json cannot drift
# above reality. (Locally the axe gate runs via `tezcatl` — no Chromium download;
# `npm run check:axe`.) The vuln gate (lockfile-only) is re-proven in brand-checks.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - uses: actions/setup-java@8df1039502a15bceb9433410b1a100fbe190c53b # v4.5.0
        with:
          distribution: temurin
          java-version: "21"
      - name: Install deps (@axe-core/playwright for a11y; vnu-jar for HTML validation)
        run: npm ci --no-audit --no-fund
      - name: Install Chromium for the axe gate (Playwright CI runner)
        run: npx playwright install --with-deps chromium
      - name: Build dist/
        run: node build.mjs
      - name: axe serious/critical gate (vendored kit gate — real browser, full WCAG 2.2 A/AA incl. contrast)
        run: node vendor/conformance-kit/gates/axe-gate.mjs dist
      - name: Nu HTML Checker gate (vnu jar — HTML Living Standard, errors-only)
        run: node scripts/html-validator-gate.mjs --check
      - name: Baseline gate (stylelint-plugin-use-baseline over shipped CSS — honest status)
        run: node scripts/baseline-gate.mjs --check
