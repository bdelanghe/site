name: conformance

# Re-proving gates for the /conformance evidence that needs the build toolchain
# installed (axe, the Nu HTML Checker, and Baseline). Each gate MEASURES a tier-1
# external criterion over the freshly-built dist/ and BLOCKS on regression, so
# data/conformance-evidence.json cannot drift above reality.
#
# axe runs BROWSER-FREE here: axe-core in jsdom (no Chromium, no macOS runner). jsdom
# can't lay out/paint, so the rendering-dependent rules (color-contrast, target-size)
# are deferred to lone's static color_contrast check (a11y.wcag22-aa-auto). For the
# FULL real-browser pass (incl. contrast), run the vendored kit gate locally via
# tezcatl: `npm run check:axe` (macOS WebKit). The vuln gate is re-proven in brand-checks.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
      - uses: actions/setup-java@8df1039502a15bceb9433410b1a100fbe190c53b # v4.5.0
        with:
          distribution: temurin
          java-version: "21"
      - name: Install deps (axe-core + jsdom for a11y; vnu-jar for HTML validation)
        run: npm ci --no-audit --no-fund
      - name: Vendored conformance-kit hash-pin is intact (this workflow calls build.mjs directly, bypassing npm's prebuild hook)
        run: npm run check:integrity
      - name: Checkout brand's source (token-a11y.json fixture only — not published to npm)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: bdelanghe/brand
          ref: main
          path: brand
      - name: Build dist/
        run: node build.mjs
      - name: axe serious/critical gate (axe-core in jsdom — browser-free; color-contrast via lone)
        run: node scripts/axe-gate.mjs --check
      - name: Nu HTML Checker gate (vendored kit gate — vnu jar, errors-only)
        run: node vendor/conformance-kit/gates/html-validator-gate.mjs dist
      - name: Baseline gate (vendored kit gate — web-features over shipped CSS)
        run: node vendor/conformance-kit/gates/baseline-gate.mjs
      - name: AI-readability gate (vendored kit gate — llms.txt valid + links resolve + Markdown siblings)
        run: AIR_SIBLING_IGNORE=404 node vendor/conformance-kit/gates/ai-readability-gate.mjs dist
      - name: Token-a11y gate (vendored kit suite — full design-token accessibility over the brand's own config)
        run: node vendor/conformance-kit/gates/token-a11y.mjs brand/tokens/token-a11y.json
