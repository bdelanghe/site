name: deploy

# Hermetic deploy: nix build (nodejs + brand pinned by flake.lock) → wrangler deploy
# to the `site` worker. Uses the CLOUDFLARE_API_TOKEN repo secret.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - uses: DeterminateSystems/nix-installer-action@90bb610b90bf290cad97484ba341453bd1cbefea # v19

      - name: Build (nix, reproducible)
        run: nix build .#site -L

      - name: Stage dist for wrangler
        run: cp -rL result dist && chmod -R u+w dist

      - name: Check for deploy secret
        id: gate
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF_TOKEN" ]; then echo "ready=true" >> "$GITHUB_OUTPUT"; else
            echo "ready=false" >> "$GITHUB_OUTPUT"; echo "::warning::CLOUDFLARE_API_TOKEN not set — built but did not deploy."; fi

      - name: Deploy to Cloudflare Workers
        if: steps.gate.outputs.ready == 'true'
        run: nix develop --command wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
