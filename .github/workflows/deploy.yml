name: deploy

# Two-phase, promote-the-artifact pipeline:
#   build   — hermetic nix build → keyless-sign the in-toto/SLSA statement and the whole-site
#             manifest (Sigstore/Rekor, no held key) → publish a SIGNED, fully-deployable OCI
#             artifact to GHCR. Site-specific (résumé PDF, scripts) — stays here.
#   deploy  — the CANONICAL reusable pipeline (bounded-systems/.github): pull + cosign-verify the
#             artifact, upload an un-served preview version, cryptographically verify that version's
#             own preview URL, then promote to prod behind the site-promote required-reviewers gate.
#             Fail-closed by construction; one source of truth shared with bounded.tools.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC: lets cosign mint a keyless Fulcio cert for build provenance
  packages: write # push the built site to GHCR as a signed OCI artifact

concurrency:
  group: deploy
  # A run stuck waiting at the site-promote approval gate (never approved or
  # rejected) otherwise blocks every subsequent deploy indefinitely — that's
  # exactly what silently queued a real deploy behind a 3-day-old unreviewed
  # one. promote's only prod-affecting step (wrangler versions deploy) is a
  # single atomic Cloudflare routing switch, not a multi-step process that can
  # be left half-applied; cancelling mid-promote can at worst interrupt the
  # post-switch verification (site.sha256/provenance.json check + HTTP probe)
  # for that one run, not corrupt what's already live.
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      oci: ${{ steps.publish.outputs.oci }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - uses: DeterminateSystems/nix-installer-action@90bb610b90bf290cad97484ba341453bd1cbefea # v19
      - name: Build (nix, reproducible)
        run: nix build .#site -L
      - name: Stage dist
        run: cp -rL result dist && chmod -R u+w dist

      # SPDX 2.3 SBOM over the whole supply chain (npm + Nix + brand), then the
      # in-toto/SLSA statement over the hermetic subjects — both keyless-signed
      # (cosign sign-blob → Fulcio cert from the Actions OIDC identity → Rekor). No
      # stored key. gen-sbom runs FIRST so the SBOM is an attestation subject;
      # check-sbom is the fail-closed completeness gate (SBOM ↔ attestation). BEFORE
      # resume.pdf so the statement's subjects stay reproducible. The SBOM blob is
      # signed in the OCI step (after the manifest), so its sidecar stays out of the
      # whole-site manifest like the other provenance sidecars.
      - name: Sign provenance statement + SBOM (keyless Sigstore)
        run: |
          nix develop .#deploy --command bash -euo pipefail -c '
            # Static JSON API + OpenAPI and the did:web + résumé Verifiable Credential,
            # emitted BEFORE the manifest so they are covered by site.sha256 like the
            # rest of dist/ (the VC blob is signed after the manifest, below).
            node scripts/gen-api.mjs
            node scripts/gen-identity.mjs
            node scripts/gen-sbom.mjs
            node scripts/gen-attestation.mjs
            node scripts/check-sbom.mjs
            cosign sign-blob --yes \
              --bundle dist/attestation.intoto.json.sigstore.json \
              dist/attestation.intoto.json
          '
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Render static resume PDF (headless Chrome)
        # Rendered from the built page AFTER the in-toto statement: Chrome output
        # is non-deterministic + impure, so it stays out of the hermetic nix build
        # and that statement. It IS covered by the whole-site manifest below (the
        # honest record of the served bytes). Chrome is preinstalled on the runner;
        # a tiny local server lets absolute /brand asset paths resolve.
        run: |
          python3 -m http.server 8099 --directory dist &
          srv=$!
          for i in $(seq 1 20); do curl -fsS http://127.0.0.1:8099/resume.html >/dev/null 2>&1 && break; sleep 0.5; done
          google-chrome --headless --no-sandbox --disable-gpu --hide-scrollbars \
            --no-pdf-header-footer --virtual-time-budget=12000 \
            --print-to-pdf=dist/resume.pdf http://127.0.0.1:8099/resume.html
          kill "$srv" 2>/dev/null || true
          ls -la dist/resume.pdf

      # Content-address the whole served site (resume.pdf included), keyless-sign
      # that manifest, write /provenance.json, then publish the WHOLE dist/ (site
      # + provenance sidecars) to GHCR as one signed, deployable OCI artifact.
      - name: Sign + publish the signed OCI artifact (keyless Sigstore → GHCR)
        id: publish
        env:
          GHCR_REPO: ghcr.io/bdelanghe/robertdelanghe-dev
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          nix develop .#deploy --command bash -euo pipefail -c '
            short=$(printf "%s" "$GITHUB_SHA" | cut -c1-7)
            node scripts/gen-sitemanifest.mjs
            cosign sign-blob --yes --bundle dist/site.sha256.sigstore.json dist/site.sha256
            # Keyless-sign the SBOM blob (same Fulcio/Rekor identity). AFTER the
            # manifest: dist/sbom.spdx.json is covered by site.sha256, while its
            # signature sidecar stays out of the manifest, matching the attestation +
            # manifest sidecars. Both ride inside the signed OCI artifact (it is in dist/).
            cosign sign-blob --yes --bundle dist/sbom.spdx.json.sigstore.json dist/sbom.spdx.json
            # Keyless-sign the résumé Verifiable Credential the same way (enveloping
            # Sigstore proof). AFTER the manifest, like the SBOM: resume.vc.json is
            # covered by site.sha256, its signature sidecar stays out of the manifest.
            cosign sign-blob --yes --bundle dist/api/v1/resume.vc.json.sigstore.json dist/api/v1/resume.vc.json
            OCI_REF="$GHCR_REPO:$short" node scripts/gen-provenance.mjs
            # Content-address the served site as an IPFS UnixFS dir CID (no daemon) and
            # record it in provenance.json alongside the manifest digest — AFTER
            # gen-provenance writes that file. Uses the signed site.sha256 file set.
            node vendor/conformance-kit/generators/gen-cid.mjs
            tar --sort=name --owner=0 --group=0 --numeric-owner --mtime=@0 -C dist -cf site.tar .
            gzip -n -f site.tar
            printf "%s" "$GITHUB_TOKEN" | oras login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            oras push "$GHCR_REPO:$short" \
              --artifact-type application/vnd.robertdelanghe.site.v1+gzip \
              site.tar.gz:application/gzip | tee oras-push.log
            oras tag "$GHCR_REPO:$short" latest
            digest=$(awk "/Digest:/ {print \$2}" oras-push.log)
            printf "%s" "$GITHUB_TOKEN" | cosign login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            cosign sign --yes "$GHCR_REPO@$digest"
            echo "oci=$GHCR_REPO@$digest" >> "$GITHUB_OUTPUT"
          '

  # DEPLOY: hand the signed artifact to the CANONICAL reusable pipeline (preview → cryptographic
  # verify of the version's preview URL → gated promote). The required-reviewers `site-promote`
  # Environment lives in THIS repo, so the human approval gate is enforced here. One source of
  # truth for the deploy machinery: bounded-systems/.github.
  # (Pinned to the branch until bounded-systems/.github#38 merges; then -> @main / SHA.)
  deploy:
    needs: build
    if: needs.build.outputs.oci != ''
    uses: bounded-systems/.github/.github/workflows/site-deploy.yml@54f5856348dd2ccdd3828705145554c177cc40a8 # main
    with:
      oci: ${{ needs.build.outputs.oci }}
      domain: "https://robertdelanghe.dev"
      identity_regexp: "^https://github.com/bdelanghe/site/"
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
