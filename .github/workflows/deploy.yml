name: deploy

# Primary deploy: one repo-owned, hermetic pipeline. nix build (nodejs + brand
# pinned by flake.lock) → sign a real in-toto/SLSA attestation → wrangler deploy.
# The builder is THIS workflow (an honest SLSA builder id); ATTEST_KEY lives in one
# place (GitHub secrets). Disconnect Cloudflare's Workers Builds Git App so the two
# don't double-deploy.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - uses: DeterminateSystems/nix-installer-action@90bb610b90bf290cad97484ba341453bd1cbefea # v19
      - name: Build (nix, reproducible)
        run: nix build .#site -L
      - name: Stage dist for wrangler
        run: cp -rL result dist && chmod -R u+w dist
      - name: Sign provenance attestation
        # The nix build is hermetic (no secret, no randomness), so signing happens
        # here on the staged dist/ — with the stable key when ATTEST_KEY is set.
        run: nix develop --command node scripts/gen-attestation.mjs
        env:
          ATTEST_KEY: ${{ secrets.ATTEST_KEY }}
          GITHUB_SHA: ${{ github.sha }}
      - name: Render static resume PDF (headless Chrome)
        # Rendered from the built page AFTER attestation: Chrome output is
        # non-deterministic + impure, so it stays out of the hermetic nix build
        # and the signed attestation — same posture as cards.yml. Served as a
        # static /resume.pdf, regenerated every deploy so it never drifts from
        # the live page. Chrome is preinstalled on the runner; a tiny local
        # server lets the page's absolute /brand asset paths resolve.
        run: |
          python3 -m http.server 8099 --directory dist &
          srv=$!
          for i in $(seq 1 20); do curl -fsS http://127.0.0.1:8099/resume.html >/dev/null 2>&1 && break; sleep 0.5; done
          google-chrome --headless --no-sandbox --disable-gpu --hide-scrollbars \
            --no-pdf-header-footer --virtual-time-budget=12000 \
            --print-to-pdf=dist/resume.pdf http://127.0.0.1:8099/resume.html
          kill "$srv" 2>/dev/null || true
          ls -la dist/resume.pdf
      - name: Deploy to Cloudflare Workers
        # EXPERIMENT: repo-pinned wrangler (4.103) — nixpkgs' 4.93 ignores
        # assets.run_worker_first, so the worker never runs.
        run: nix develop --command sh -c 'npm ci --no-audit --no-fund && node_modules/.bin/wrangler deploy'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
