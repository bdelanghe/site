name: seo

# SEO + CommonMark build gates — the discoverability + content-render members of the
# contract family. seo-gate validates the BUILT dist/ (one self-consistent canonical per
# page, unique non-empty title + meta description, no accidental noindex, RFC 9309
# robots.txt, every sitemap URL resolves, zero broken internal links). commonmark-gate
# pins the posts markdown renderer (CommonMark subset + raw-HTML escaping). Both blocking:
# the build fails on any violation. See docs/seo-gate.md + docs/commonmark-gate.md.
on:
  pull_request:
  push:
    branches: [main]
    paths:
      - "build.mjs"
      - "posts.mjs"
      - "posts/**"
      - "data/**"
      - "contract/commonmark-fixtures.json"
      - "vendor/conformance-kit/gates/seo-gate.mjs"
      - "vendor/conformance-kit/gates/commonmark-runner.mjs"
      - ".github/workflows/seo.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: recursive
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Vendored conformance-kit hash-pin is intact (this workflow calls build.mjs directly, bypassing npm's prebuild hook)
        run: npm run check:integrity
      - name: Build site
        run: node build.mjs
      - name: CommonMark assertion — posts renderer is pinned + escapes raw HTML
        run: npm run check:commonmark
      - name: SEO gate — canonical / title / description / robots / sitemap / links
        run: npm run check:seo
