name: resume-parse

# Résumé-parser gate: build dist/, then read dist/resume.html the way an automated
# parser (ATS) would — count its tokens and have Claude parse it as an ATS,
# reporting the extracted fields + what it can't cleanly parse. Report-only
# (findings → the run summary); --strict fails below an ats_parseability threshold.
# Skips cleanly when ANTHROPIC_API_KEY is absent.
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "data/profile.json"
      - "resume-parse.mjs"

permissions:
  contents: read

jobs:
  resume-parse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: recursive
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
      - run: npm ci --no-audit --no-fund # installs @bdelanghe/brand (build.mjs reads it from node_modules)
      - name: Build dist/
        run: node build.mjs
      - name: Parse the résumé as an ATS
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node resume-parse.mjs # report-only; add --strict to gate
