name: graph-pipeline
# The SAME chain as bounded.tools, with THIS site's plugins (resume + palette). One
# core (synoptic@v0.6.2); the site supplies evidence + config. evidence → graph
# (parse-attested) → claims SBOM (SPDX, edges unrolled) + a page projected from the
# graph (project-attested), bridged back to the org. Uploads all artifacts.
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with: { repository: bounded-systems/synoptic, ref: v0.8.0, path: .synoptic, persist-credentials: false }
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with: { node-version: "22" }
      - run: npm ci
      - name: graph — evidence (resume + tokens) → one linked graph (parse-attested)
        run: node .synoptic/graph.mjs --out data/graph.json
      - name: claims SBOM — SPDX, edges unrolled
        run: mkdir -p dist && node .synoptic/sbom.mjs --graph data/graph.json --out dist/claims.sbom.spdx.json --namespace https://robertdelanghe.dev
      - name: project the site FROM the graph (project-attested)
        run: node .synoptic/build-site.mjs --graph data/graph.json --out dist
      - name: publish /json.ld
        run: cp data/graph.json dist/json.ld
      - name: secret-scan the projection (public — must be clean)
        run: node .synoptic/secret-scan.mjs dist --allow email
      - name: summary — the chain
        run: |
          echo "graph: $(node -e 'console.log(require("./data/graph.json")["@graph"].length)') nodes · parse attestations: $(node -e 'console.log(require("./data/graph.provenance.json").length)')"
          echo "SBOM: $(node -e 'const s=require("./dist/claims.sbom.spdx.json");console.log(s.packages.length+" pkgs, "+s.relationships.length+" edges")') · components: $(ls dist/components/*.html | wc -l | tr -d ' ')"
          echo "bridge: $(node -e 'const p=require("./data/graph.json")["@graph"].find(n=>n["@type"]===\"Person\");console.log(JSON.stringify(p.affiliation||\"none\"))')"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: graph-chain
          path: |
            dist/json.ld
            dist/claims.sbom.spdx.json
            dist/graph-page.html
            dist/components/
            data/graph.provenance.json
