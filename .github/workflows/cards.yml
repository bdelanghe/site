name: cards

# Per-article social cards (og:image), generated from posts + brand tokens with
# headless Chrome (preinstalled on the runner) — kept out of the pure `npm run build`
# so the hermetic build stays dep-free. Generates only for posts missing a card
# (no churn from non-deterministic raster), then opens a PR rather than pushing.
on:
  push:
    branches: [main]
    paths: ["posts/**", "card.mjs", "data/profile.json", ".github/workflows/cards.yml"]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  cards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Fetch brand content tokens
        run: curl -fsSL https://raw.githubusercontent.com/bdelanghe/brand/main/content/strings.json -o /tmp/strings.json

      - name: Generate cards that are missing (home + per-post)
        run: |
          mkdir -p assets/cards
          shot() {  # $1=html  $2=png
            google-chrome --headless --no-sandbox --disable-gpu --hide-scrollbars \
              --force-device-scale-factor=1 --window-size=1200,630 \
              --screenshot="$2" "file://$1"
            echo "generated $2"
          }
          # Homepage og:image — the personal home card (foregrounds the person, not the
          # org). Generate-if-missing like posts; delete it to refresh after a copy change.
          if [ ! -f assets/cards/home.png ]; then
            node card.mjs --home --strings /tmp/strings.json --out /tmp/home.html
            shot /tmp/home.html assets/cards/home.png
          fi
          for f in posts/*.md; do
            slug=$(basename "$f" .md)
            png="assets/cards/$slug.png"
            if [ -f "$png" ]; then continue; fi
            node card.mjs --slug "$slug" --strings /tmp/strings.json --out "/tmp/$slug.html"
            shot "/tmp/$slug.html" "$png"
          done

      - name: Open a PR if any cards were added
        uses: peter-evans/create-pull-request@v7
        with:
          branch: auto/social-cards
          delete-branch: true
          add-paths: assets/cards
          commit-message: "chore: generate social cards from tokens (headless Chrome)"
          title: "Auto: social cards for new posts"
          body: |
            Per-article OG cards generated from `posts/*.md` + brand tokens via headless Chrome.
            Only posts that were missing a card are included. Merge to publish them.
