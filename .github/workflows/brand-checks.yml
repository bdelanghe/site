name: brand-checks

# Gate the site against the shared design + content system (@bdelanghe/brand):
# no hardcoded colours, content tokens, complete meta + agent-readiness, a11y contrast.
# brand's own dev tooling (tools/*.mjs) isn't published to npm — it's CI-internal
# analysis tooling, not a distributable asset — so this job checks out brand's
# source, purely to run those scripts; build.mjs itself still only reads the
# installed package (node_modules/@bdelanghe/brand). bdelanghe/brand isn't
# release-tagged (personal, actively-developed pinning) — checks out main
# directly rather than resolving a version tag.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - run: npm ci # installs @bdelanghe/brand (build.mjs reads it from node_modules)
      - name: Vendored conformance-kit hash-pin is intact (this workflow calls build.mjs directly, bypassing npm's prebuild hook)
        run: npm run check:integrity
      - name: Checkout brand's source (dev tooling only — not published to npm)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: bdelanghe/brand
          ref: main
          path: brand
      - name: Build dist/
        run: node build.mjs
      - name: Known-vuln gate (vendored kit gate — production deps, re-proven)
        run: node vendor/conformance-kit/gates/vuln-gate.mjs
      - name: atomic-copy gate (every visible word on / + /resume is a copy atom)
        run: node scripts/copy-gate.mjs --strict
      - name: No hardcoded colours (all colours are tokens)
        run: node brand/tools/coverage.mjs --colors --check dist
      - name: Content tokens (schema + Gherkin + lint)
        run: node brand/tools/content.mjs --check dist
      - name: Meta + agent-readiness
        run: node brand/tools/meta.mjs --check dist
      - name: Accessibility (WCAG AA contrast + headings)
        run: node brand/tools/a11y.mjs --check dist
      - name: Install structure-audit deps (vendored conformance-kit tenant)
        run: npm ci --prefix vendor/conformance-kit/integrity/structure-audit
      - name: Whole-page structure gate (reader survivability + outline + links)
        # The kit's structure-audit is site-agnostic: this site's committed baseline
        # (structure.json) is an INPUT, kept in the consumer via $STRUCTURE_BASELINE
        # (so the hash-pinned kit copy isn't mutated by --check). The link-checker's
        # served-artifact allow-list is config-driven ($STRUCTURE_AUDIT_SIDECARS):
        # these paths are deploy/later-step MACHINE artifacts, not navigational pages,
        # absent from this plain `node build.mjs` — so /conformance's evidence links to
        # them (and /resume.pdf) aren't flagged dead. /provenance.json + /site.sha256
        # are in the kit's default allow-list; the rest are this site's evidence set:
        #   /resume.pdf                         — print-to-pdf at deploy
        #   /attestation.intoto.json(.sigstore) — in-toto/SLSA statement + Sigstore bundle
        #   /sbom.spdx.json(.sigstore)          — SPDX SBOM + Sigstore bundle
        #   /site.sha256.sigstore.json          — signed whole-site manifest bundle
        run: |
          STRUCTURE_AUDIT_SIDECARS=/resume.pdf,/attestation.intoto.json,/attestation.intoto.json.sigstore.json,/sbom.spdx.json,/sbom.spdx.json.sigstore.json,/site.sha256.sigstore.json \
          STRUCTURE_BASELINE=vendor/conformance-kit/integrity/structure-audit/structure.json \
          node vendor/conformance-kit/integrity/structure-audit/audit.mjs dist --check
